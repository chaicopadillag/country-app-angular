<table *ngIf="countries.length>0" class="table table-striped table-bordered table-hover">
  <thead class="table-dark">
    <tr>
      <th scope="col">#</th>
      <th scope="col">Bandera</th>
      <th scope="col">Pais</th>
      <th scope="col">Capital</th>
      <th scope="col">Población</th>
      <th scope="col">Acción</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let country of countries; let i=index">
      <th scope="row">{{i+1}}</th>
      <td class="text-center">
        <img width="50" [src]="country.flags.svg" [alt]="country.name.official">
      </td>
      <td>{{country.name.common}}</td>
      <td>{{country.capital}}</td>
      <td>{{country.population}}</td>
      <td>
        <a [routerLink]="['/country',country.cca2]">Ver más</a>
      </td>
    </tr>

  </tbody>
</table>
